<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conta</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.tabela{
    width:100%;
    border-collapse:collapse;
}

.tabela th,
.tabela td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

.tabela th{
    background:#f3f3f3;
}

.total{
    margin-top:20px;
    text-align:right;
    font-size:24px;
    font-weight:bold;
    color:#27ae60;
}

.botoes{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    font-weight:bold;
}

.voltar{
    background:#2c3e50;
}

.finalizar{
    background:#27ae60;
}
</style>
</head>
<body>

<header>
📄 Resumo do Pedido
</header>

<div class="container">

{% if itens %}

<table class="tabela">

    <tr>
        <th>Produto</th>
        <th>Preço</th>
    </tr>

    {% for id,item in itens %}
    <tr>
        <td>{{ item[0] }}</td>
        <td>R$ {{ item[1] }},00</td>
    </tr>
    {% endfor %}

</table>

<div class="total">
    Total: R$ {{ total }},00
</div>

{% else %}

<h3>Nenhum item no pedido.</h3>

{% endif %}

<div class="botoes">

    <a href="{{ url_for('carrinho') }}" class="btn voltar">
        ← Voltar ao Carrinho
    </a>

    <a href="#" class="btn finalizar">
        ✔ Finalizar Compra
    </a>

</div>

</div>

</body>
</html>
