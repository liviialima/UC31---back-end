<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoritos</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    border-bottom:1px solid #ddd;
}

.nome{
    font-size:18px;
    font-weight:bold;
}

.preco{
    color:#277cae;
    font-weight:bold;
}

.acoes{
    display:flex;
    gap:10px;
}

.btn{
    text-decoration:none;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    font-weight:bold;
}

.remover{
    background:#e74c3c;
}

.carrinho{
    background:#27ae60;
}

.voltar{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:10px 15px;
    border-radius:8px;
}
</style>
</head>
<body>

<header>
⭐ Meus Favoritos
</header>

<div class="container">

{% if items %}

    {% for id,item in items %}
    <div class="item">

        <div>
            <div class="nome">{{ item[0] }}</div>
            <div class="preco">R$ {{ item[1] }},00</div>
        </div>

        <div class="acoes">
            <a href="{{ url_for('mover_para_local', item_id=id) }}" class="btn carrinho">
                🛒 Carrinho
            </a>

            <a href="{{ url_for('remover_favorito', item_id=id) }}" class="btn remover">
                ❌ Remover
            </a>
        </div>

    </div>
    {% endfor %}

{% else %}

<h3>Nenhum item favoritado.</h3>

{% endif %}

<a href="{{ url_for('index') }}" class="voltar">
← Voltar ao Cardápio
</a>

</div>

</body>
</html>
